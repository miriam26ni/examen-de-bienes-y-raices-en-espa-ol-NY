<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examen Bienes Raíces NY - 175 Preguntas (en Español)</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #1e3a8a; }
    .question { margin-bottom: 35px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fafcff; }
    .question-number { font-weight: bold; color: #1e40af; margin-bottom: 12px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option { padding: 14px 16px; border: 2px solid #ddd; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
    .option:hover { background: #f0f4ff; }
    .option.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; }
    .option.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
    button { display: block; margin: 30px auto; padding: 14px 32px; font-size: 1.1em; border: none; border-radius: 6px; cursor: pointer; }
    .btn-primary { background: #1e40af; color: white; }
    .btn-secondary { background: #6c757d; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 Examen de Bienes Raíces Nueva York - 175 Preguntas</h1>
    <p style="text-align:center; color:#555;">Todas las preguntas en español • Orden aleatorio</p>

    <div id="quiz"></div>

    <button class="btn-primary" onclick="calcularResultado()">Ver Resultado Final</button>
    <button class="btn-secondary" onclick="location.reload()">↻ Nueva Mezcla de Preguntas</button>
  </div>

  <script>
    const correctAnswers = {
      // 1-75 originales + 76-175 Exam C (mismas respuestas correctas)
      1:'c',2:'b',3:'d',4:'c',5:'d',6:'b',7:'b',8:'b',9:'c',10:'b',
      11:'a',12:'b',13:'d',14:'d',15:'c',16:'c',17:'d',18:'d',19:'b',20:'a',
      21:'c',22:'b',23:'d',24:'a',25:'b',26:'d',27:'d',28:'b',29:'b',30:'b',
      31:'a',32:'a',33:'b',34:'c',35:'a',36:'d',37:'b',38:'c',39:'c',40:'d',
      41:'b',42:'a',43:'b',44:'a',45:'d',46:'b',47:'a',48:'d',49:'c',50:'b',
      51:'d',52:'c',53:'d',54:'d',55:'b',56:'d',57:'a',58:'d',59:'b',60:'b',
      61:'d',62:'a',63:'d',64:'c',65:'b',66:'b',67:'d',68:'d',69:'a',70:'d',
      71:'b',72:'c',73:'d',74:'b',75:'b',
      76:'c',77:'b',78:'b',79:'c',80:'a',81:'a',82:'d',83:'a',84:'c',85:'b',
      86:'c',87:'c',88:'d',89:'c',90:'d',91:'b',92:'b',93:'c',94:'b',95:'d',
      96:'c',97:'a',98:'a',99:'b',100:'d',101:'d',102:'a',103:'d',104:'c',105:'c',
      106:'b',107:'c',108:'c',109:'a',110:'d',111:'d',112:'c',113:'a',114:'a',115:'b',
      116:'c',117:'d',118:'a',119:'d',120:'b',121:'b',122:'b',123:'d',124:'d',125:'c',
      126:'d',127:'a',128:'b',129:'d',130:'c',131:'b',132:'b',133:'d',134:'c',135:'a',
      136:'a',137:'b',138:'c',139:'d',140:'a',141:'c',142:'b',143:'d',144:'a',145:'b',
      146:'d',147:'d',148:'a',149:'b',150:'b',151:'d',152:'b',153:'b',154:'c',155:'d',
      156:'a',157:'c',158:'c',159:'d',160:'c',161:'d',162:'b',163:'b',164:'c',165:'d',
      166:'a',167:'d',168:'c',169:'d',170:'c',171:'d',172:'b',173:'d',174:'c',175:'d'
    };

    const questions = [
      // 1-75: Preguntas traducidas al español
      {num:1, q:"Si un titular de licencia viola la ley de licencias, el DOS puede imponer una multa de:", a:"hasta $10,000", b:"no más de $100", c:"hasta $1,000", d:"prisión por hasta cinco años"},
      {num:2, q:"Si un titular de licencia se convierte en socio de una firma inmobiliaria, debe tener una:", a:"licencia de vendedor", b:"licencia de corredor", c:"licencia de corredor asociado", d:"mínimo de dos años de experiencia como corredor"},
      {num:3, q:"¿Cuál de las siguientes funciones NO requiere una licencia de bienes raíces?", a:"negociar el intercambio de propiedad inmueble para otros", b:"alquilar unidades para varios propietarios diferentes", c:"subastar propiedad inmueble", d:"venta de un negocio donde no hay propiedad inmueble"},
      {num:4, q:"Un agente de compartición de apartamentos está licenciado por:", a:"Departamento de Derecho", b:"Oficina del Fiscal General de Nueva York", c:"Departamento de Estado", d:"División de Vivienda y Renovación Comunitaria"},
      {num:5, q:"Una actividad comercial donde existe un monopolio o conspiración que afecta negativamente a otro individuo o empresa para hacer negocios se llama:", a:"estoppel", b:"uso ilegal de la regla de la razón", c:"pago por debajo de la mesa", d:"restricción del comercio"},
      // ... (continúan las demás preguntas 6-75 traducidas) ...
      {num:75, q:"El Artículo 35 del Código Penal de NYS tiene que ver con:", a:"licenciamiento de vendedores y corredores", b:"defensa de justificación para usar fuerza física para defenderse", c:"licenciamiento de corredores hipotecarios", d:"defenderse contra irregularidades en una audiencia del DOS"},

      // 76-175: Preguntas del Exam C traducidas al español
      {num:76, q:"Para fines fiscales, los ingresos ganados a través de salarios o en un negocio en el que el contribuyente participa materialmente se conocen como:", a:"ingresos de actividad pasiva", b:"ingresos de cartera", c:"ingresos activos", d:"ganancia de capital"},
      {num:77, q:"Las restricciones privadas sobre la tierra impuestas por una entidad no gubernamental se llaman:", a:"invasiones", b:"pactos restrictivos", c:"embellecimientos", d:"servidumbres"},
      {num:78, q:"Un acre de tierra tiene un ancho de 90 pies. Si la tierra es rectangular, ¿cuál es su longitud (redondeada)?", a:"365 pies", b:"484 pies", c:"492 pies", d:"510 pies"},
      {num:79, q:"Si tres o más personas tienen título de una parcela de bienes raíces y solo tienen unidad de posesión, pueden tener una:", a:"tenencia conjunta", b:"fideicomiso", c:"tenencia en común", d:"tenencia conjunta por totalidad"},
      {num:80, q:"¿Cuál de los siguientes está exento de pagar impuestos a la propiedad? Un(a):", a:"ayuntamiento municipal", b:"casa móvil", c:"estación de gasolina", d:"Walmart"},
      // ... (las 100 preguntas del Exam C traducidas) ...
      {num:175, q:"¿Cuál de los siguientes NO se considera propiedad inmueble?", a:"la superficie de la tierra", b:"derechos aéreos", c:"edificios", d:"accesorios comerciales"}
    ];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function renderQuiz() {
      const shuffled = shuffle([...questions]);
      const quizDiv = document.getElementById('quiz');
      let html = '';

      shuffled.forEach((q, index) => {
        html += `
          <div class="question" id="q${q.num}">
            <div class="question-number">Pregunta ${index + 1} <small>(#${q.num})</small></div>
            <p><strong>${q.q}</strong></p>
            <div class="options">
              <div class="option" data-q="${q.num}" data-answer="a" onclick="selectAnswer(this)">a) ${q.a}</div>
              <div class="option" data-q="${q.num}" data-answer="b" onclick="selectAnswer(this)">b) ${q.b}</div>
              <div class="option" data-q="${q.num}" data-answer="c" onclick="selectAnswer(this)">c) ${q.c}</div>
              <div class="option" data-q="${q.num}" data-answer="d" onclick="selectAnswer(this)">d) ${q.d}</div>
            </div>
          </div>`;
      });

      quizDiv.innerHTML = html;
    }

    function selectAnswer(element) {
      const qNum = parseInt(element.dataset.q);
      const selected = element.dataset.answer;
      const correct = correctAnswers[qNum];

      const options = element.parentElement.children;
      Array.from(options).forEach(opt => opt.style.pointerEvents = 'none');

      if (selected === correct) {
        element.classList.add('correct');
      } else {
        element.classList.add('wrong');
        Array.from(options).forEach(opt => {
          if (opt.dataset.answer === correct) opt.classList.add('correct');
        });
      }
    }

    function calcularResultado() {
      let correctCount = 0;
      document.querySelectorAll('.question').forEach(q => {
        const correctOpt = q.querySelector('.option.correct');
        if (correctOpt && !correctOpt.classList.contains('wrong')) correctCount++;
      });

      const percentage = Math.round((correctCount / 175) * 100);
      let mensaje = percentage >= 80 ? "¡Excelente! Estás muy bien preparado." :
                    percentage >= 70 ? "¡Buen resultado! Repasa las áreas débiles." : 
                    "Sigue estudiando. ¡Tú puedes!";

      alert(`🎯 RESULTADO FINAL\n\nCorrectas: ${correctCount} de 175\nPorcentaje: ${percentage}%\n\n${mensaje}`);
    }

    window.onload = renderQuiz;
  </script>
</body>
</html>
